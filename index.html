<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ivan Codrean</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unna:ital,wght@0,400;0,700;1,400;1,700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F8F4EE;
      --ink: #1C1A18;
      --ink-light: #7A746C;
      --font-display: 'Unna', Georgia, serif;
      --font-body: 'Jost', sans-serif;
      --space: 3.5rem;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background-color: var(--cream);
      padding: 2rem var(--space);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-name {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
    }

    nav { display: flex; align-items: center; gap: 2.5rem; }

    nav a {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    nav a:hover { color: var(--ink); }

    /* ── MAIN ── */
    main {
      flex: 1;
      padding: 0 var(--space);
      padding-top: 10rem;
      padding-bottom: 6rem;
    }

    /* ── PROJECT LIST ── */
    .project-list { list-style: none; width: 100%; }

    .project-item {
      border-top: 1px solid rgba(28, 26, 24, 0.12);
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.6s ease forwards;
    }
    .project-item:nth-child(1) { animation-delay: 0.1s; }
    .project-item:nth-child(2) { animation-delay: 0.2s; }
    .project-item:nth-child(3) { animation-delay: 0.3s; }
    .project-item:nth-child(4) { animation-delay: 0.4s; }
    .project-item:last-child { border-bottom: 1px solid rgba(28, 26, 24, 0.12); }

    .project-link {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 1.8rem 0;
      text-decoration: none;
      color: var(--ink);
      transition: padding-left 0.35s ease;
      gap: 2rem;
    }
    .project-link:hover { padding-left: 1rem; }
    .project-link:hover .project-title { font-style: italic; }

    .project-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: -0.01em;
      transition: font-style 0.2s ease;
    }

    .project-meta {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-light);
      white-space: nowrap;
      align-self: center;
      flex-shrink: 0;
    }

    /* ── PROJECT PAGE ── */
    .project-page {
      display: none;
      position: fixed;
      inset: 0;
      background-color: var(--cream);
      z-index: 200;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
    }
    .project-page.active { display: flex; }

    /* Top bar */
    .project-header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 2rem var(--space) 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: var(--cream);
      flex-shrink: 0;
    }

    .project-header-title {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 0.8rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
    }

    .back-btn {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-light);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s ease;
    }
    .back-btn:hover { color: var(--ink); }

    /* Description bar */
    .project-description-bar {
      display: none;
      padding: 0 var(--space) 1.5rem;
      flex-shrink: 0;
      background-color: var(--cream);
      border-bottom: 1px solid rgba(28, 26, 24, 0.1);
    }
    .project-description-bar.visible { display: block; }

    .project-description-text {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.82rem;
      line-height: 1.7;
      color: var(--ink-light);
      max-width: 56rem;
      font-style: italic;
    }

    /* ── GALLERY ── */
    /* Outer horizontal scroll container */
    .gallery-scroll {
      width: 100%;
      flex-shrink: 0;
      display: flex;
      overflow-x: auto;
      overflow-y: visible;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      cursor: default;
    }
    .gallery-scroll::-webkit-scrollbar { display: none; }

    /* Each slide */
    .gallery-slide {
      flex-shrink: 0;
      width: 100vw;
      scroll-snap-align: start;
      display: flex;
      justify-content: center;
      padding: var(--space) 28% 7rem;
    }

    /* Image fills the padded area, height is natural */
    .gallery-slide img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Navigation arrows */
    .gallery-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 210;
      background: none;
      border: none;
      cursor: pointer;
      padding: 1rem;
      opacity: 0.2;
      transition: opacity 0.3s ease;
    }
    .gallery-arrow:hover { opacity: 0.7; }
    .gallery-arrow svg {
      display: block;
      width: 1rem;
      height: auto;
      stroke: var(--ink);
      stroke-width: 1.5;
      fill: none;
    }
    .gallery-arrow.prev { left: 1rem; }
    .gallery-arrow.next { right: 1rem; }
    .gallery-arrow.gone { display: none; }

    /* Counter */
    .slide-counter {
      position: fixed;
      bottom: var(--space);
      right: var(--space);
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      color: var(--ink-light);
      z-index: 210;
    }

    /* Scroll hint */
    .scroll-hint {
      position: fixed;
      bottom: var(--space);
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-light);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      opacity: 1;
      transition: opacity 0.4s ease;
      z-index: 210;
      pointer-events: none;
    }
    .scroll-hint.hidden { opacity: 0; }
    .scroll-hint::before, .scroll-hint::after {
      content: '';
      display: block;
      width: 2rem;
      height: 1px;
      background: var(--ink-light);
    }

    .gone { display: none; }
    
    /* ── CONTACT PAGE ── */
    .contact-page {
      display: none;
      position: fixed;
      inset: 0;
      background-color: var(--cream);
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .contact-page.active { display: flex; }

    .contact-content { text-align: center; }

    .contact-label {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 2.5rem;
    }

    .contact-email {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 3vw, 2.5rem);
      font-weight: 400;
      color: var(--ink);
      text-decoration: none;
      display: block;
      margin-bottom: 1.5rem;
      transition: font-style 0.2s ease;
    }
    .contact-email:hover { font-style: italic; }

    .contact-instagram {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .contact-instagram:hover { color: var(--ink); }

    .contact-close {
      position: absolute;
      top: 2rem;
      right: var(--space);
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-light);
      background: none;
      border: none;
      cursor: pointer;
      transition: color 0.2s ease;
    }
    .contact-close:hover { color: var(--ink); }

    /* ── FOOTER ── */
    footer {
      padding: 2rem var(--space);
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(28, 26, 24, 0.08);
    }

    .footer-copy {
      font-family: var(--font-body);
      font-weight: 300;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      color: var(--ink-light);
    }

    /* ── ANIMATION ── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      :root { --space: 1rem; }
      main { padding-top: 8rem; }
      .project-header { padding: 1rem 1rem 0.75rem; }
      .gallery-slide { padding: 1rem 8% 5rem; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <a href="#" class="site-name" onclick="window.showHome(); return false;">Ivan Codrean</a>
    <nav>
      <a href="#" onclick="window.showContact(); return false;">Contact</a>
      <a href="https://instagram.com/codrean.art" target="_blank" rel="noopener">Instagram</a>
    </nav>
  </header>

  <!-- ── MAIN: PROJECT LIST ── -->
  <main id="home">
    <ul class="project-list">

      <li class="project-item">
        <a href="#" class="project-link" onclick="window.openProject('book'); return false;">
          <span class="project-title">S'échapper</span>
          <span class="project-meta">Book &mdash; 2022&ndash;2025</span>
        </a>
      </li>

      <li class="project-item">
        <a href="#" class="project-link" onclick="window.openProject('summerhaze'); return false;">
          <span class="project-title">Summer Haze</span>
          <span class="project-meta">Photography &mdash; 2024</span>
        </a>
      </li>

      <li class="project-item">
        <a href="#" class="project-link" onclick="window.openProject('portraits'); return false;">
          <span class="project-title">Portraits</span>
          <span class="project-meta">Photography &mdash; 2023</span>
        </a>
      </li>

      <li class="project-item">
        <a href="#" class="project-link" onclick="window.openProject('passages'); return false;">
          <span class="project-title">Passages</span>
          <span class="project-meta">Photography &mdash; 2022&ndash;2024</span>
        </a>
      </li>

    </ul>
  </main>

  <!-- ── FOOTER ── -->
  <footer>
    <span class="footer-copy">&copy; Ivan Codrean <span id="year"></span>. All rights reserved.</span>
  </footer>

  <!-- ── PROJECT PAGE ── -->
  <div class="project-page" id="project-page">

    <div class="project-header">
      <span class="project-header-title" id="project-page-title"></span>
      <button class="back-btn" onclick="window.closeProject()">&#8592; Back</button>
    </div>

    <div class="project-description-bar" id="project-description-bar">
      <p class="project-description-text" id="project-description-text"></p>
    </div>

    <div class="gallery-scroll" id="gallery-scroll"></div>

  </div>

  <!-- Arrows (outside project-page so they stay fixed over everything) -->
  <button class="gallery-arrow prev gone" id="gallery-prev" onclick="window.galleryStep(-1)">
    <svg viewBox="0 0 20 40" xmlns="http://www.w3.org/2000/svg">
      <polyline points="16,4 4,20 16,36"/>
    </svg>
  </button>

  <button class="gallery-arrow next gone" id="gallery-next" onclick="window.galleryStep(1)">
    <svg viewBox="0 0 20 40" xmlns="http://www.w3.org/2000/svg">
      <polyline points="4,4 16,20 4,36"/>
    </svg>
  </button>

  <div class="scroll-hint gone" id="scroll-hint">Scroll</div>
  <div class="slide-counter gone" id="slide-counter"></div>

  <!-- ── CONTACT PAGE ── -->
  <div class="contact-page" id="contact-page">
    <button class="contact-close" onclick="window.closeContact()">&#8592; Back</button>
    <div class="contact-content">
      <p class="contact-label">Get in touch</p>
      <a href="mailto:hello@codrean.art" class="contact-email">hello@codrean.art</a>
      <a href="https://instagram.com/codrean.art" target="_blank" rel="noopener" class="contact-instagram">@codrean.art</a>
    </div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const projects = {

      book: {
        title: "S'échapper",
        description: '',
        images: [
          'images/book-01.jpg',
          'images/book-02.jpg',
          'images/book-03.jpg',
        ]
      },

      summerhaze: {
        title: 'Summer Haze',
        description: 'An editorial series set against secluded beaches and open water. The haze of late summer air, the warmth of an afternoon that refuses to end. Unhurried and unguarded. Model: Polina Vorontsova.',
        images: [
          'images/haze-1.jpg',
          'images/haze-2.jpg',
          'images/haze-3.jpg',
          'images/haze-4.jpg',
          'images/haze-5.jpg',
          'images/haze-6.jpg',
          'images/haze-7.jpg',
          'images/haze-8.jpg',
          'images/haze-9.jpg',
          'images/haze-10.jpg',
          'images/haze-11.jpg',
          'images/haze-12.jpg',
          'images/haze-13.jpg',
          'images/haze-14.jpg',
          'images/haze-15.jpg',
          'images/haze-16.jpg',
          'images/haze-17.jpg',
        ]
      },

      portraits: {
        title: 'Portraits',
        description: '',
        images: [
          'images/portrait-01.jpg',
          'images/portrait-02.jpg',
          'images/portrait-03.jpg',
        ]
      },

      passages: {
        title: 'Passages',
        description: '',
        images: [
          'images/passages-01.jpg',
          'images/passages-02.jpg',
          'images/passages-03.jpg',
        ]
      }

    };

    let currentProject = null;

    function updateCounter(index) {
      const total = currentProject ? currentProject.images.length : 1;
      document.getElementById('slide-counter').textContent =
        String(index + 1).padStart(2, '0') + ' / ' + String(total).padStart(2, '0');
      document.getElementById('scroll-hint').classList.toggle('hidden', index > 0);
    }

    // ── OPEN PROJECT
    window.openProject = function(key) {
      currentProject = projects[key];
      if (!currentProject) return;

      const page     = document.getElementById('project-page');
      const scroll   = document.getElementById('gallery-scroll');
      const titleEl  = document.getElementById('project-page-title');
      const descBar  = document.getElementById('project-description-bar');
      const descText = document.getElementById('project-description-text');
      const counter  = document.getElementById('slide-counter');
      const hint     = document.getElementById('scroll-hint');
      const prev     = document.getElementById('gallery-prev');
      const next     = document.getElementById('gallery-next');

      titleEl.textContent = currentProject.title;
      scroll.innerHTML = '';
      scroll.dataset.project = key;

      // Description
      if (currentProject.description && currentProject.description.trim() !== '') {
        descText.textContent = currentProject.description;
        descBar.classList.add('visible');
      } else {
        descText.textContent = '';
        descBar.classList.remove('visible');
      }

      // Build slides
      currentProject.images.forEach((src, i) => {
        const slide = document.createElement('div');
        slide.className = 'gallery-slide';
        const img = document.createElement('img');
        img.src = src;
        img.alt = currentProject.title + ' ' + (i + 1);
        slide.appendChild(img);
        scroll.appendChild(slide);
      });

      // Reset
      scroll.scrollLeft = 0;
      page.scrollTop = 0;
      page.classList.add('active');
      history.pushState({ project: key }, '', '');
      document.body.style.overflow = 'hidden';

      // Show UI
      counter.classList.remove('gone');
      hint.classList.remove('gone');
      prev.classList.remove('gone');
      next.classList.remove('gone');
      updateCounter(0);

      // Counter update on horizontal scroll
      scroll.addEventListener('scroll', function () {
        const index = Math.round(scroll.scrollLeft / window.innerWidth);
        updateCounter(index);
      });

      // Keyboard
      document.onkeydown = function (e) {
        if (e.key === 'ArrowRight') window.galleryStep(1);
        if (e.key === 'ArrowLeft')  window.galleryStep(-1);
        if (e.key === 'Escape')     window.closeProject();
      };
    };

    window.addEventListener('popstate', function () {
  if (document.getElementById('project-page').classList.contains('active')) {
    window.closeProject();
  }
});
    
    // ── STEP (arrows + keyboard)
    window.galleryStep = function(dir) {
      const scroll = document.getElementById('gallery-scroll');
      const currentIndex = Math.round(scroll.scrollLeft / window.innerWidth);
      const total = currentProject ? currentProject.images.length : 1;
      const next = Math.max(0, Math.min(total - 1, currentIndex + dir));
      scroll.scrollTo({ left: next * window.innerWidth, behavior: 'smooth' });
    };

    // ── CLOSE PROJECT
    window.closeProject = function() {
      const counter = document.getElementById('slide-counter');
      const hint    = document.getElementById('scroll-hint');
      const prev    = document.getElementById('gallery-prev');
      const next    = document.getElementById('gallery-next');

      document.getElementById('project-page').classList.remove('active');
      document.getElementById('project-description-bar').classList.remove('visible');
      counter.classList.add('gone');
      hint.classList.add('gone');
      prev.classList.add('gone');
      next.classList.add('gone');
      document.body.style.overflow = '';
      document.onkeydown = null;
      currentProject = null;
    };

    // ── CONTACT
    window.showContact = function() {
      document.getElementById('contact-page').classList.add('active');
      document.body.style.overflow = 'hidden';
    };

    window.closeContact = function() {
      document.getElementById('contact-page').classList.remove('active');
      document.body.style.overflow = '';
    };

    // ── HOME
    window.showHome = function() {
      window.closeProject();
      window.closeContact();
    };

  </script>

</body>
</html>
